<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<title>Para o Amor da Minha Vida ❤️</title>

<style>

body{
margin:0;
font-family: Arial;
background: black;
text-align:center;
color:white;
overflow-x:hidden;
}

.container{
padding:60px 20px;
}

h1{
font-size:50px;
animation: fade 2s;
}

p{
font-size:22px;
max-width:700px;
margin:auto;
line-height:1.6;
animation: fade 3s;
}

.fotos{
margin-top:40px;
}

.fotos img{
width:260px;
margin:15px;
border-radius:15px;
box-shadow:0 10px 25px rgba(0,0,0,0.3);
transition:0.4s;
}

.fotos img:hover{
transform:scale(1.1);
}

button{
margin-top:40px;
padding:15px 35px;
font-size:20px;
border:none;
border-radius:30px;
background:white;
color:#ff4d6d;
cursor:pointer;
transition:0.3s;
}

button:hover{
background:#ffe5ec;
transform:scale(1.1);
}

@keyframes fade{
from{opacity:0;transform:translateY(20px);}
to{opacity:1;transform:translateY(0);}
}

/* corações */

.heart{
position:fixed;
top:-10px;
color:white;
animation:fall linear forwards;
}

@keyframes fall{
to{
transform:translateY(100vh);
}
}

</style>
</head>

<body>

<div class="container">

<h1>Feliz Dia da Mulher Xuxu ❤️</h1>

<p>
Hoje é um dia especial, mas para mim qualquer dia ao seu lado
já é especial.  
Eu admiro sua força, sua braveza, seu carinho e tudo que você é.
Obrigado por fazer minha vida mais feliz.
</p>

<button onclick="mensagem()">
Clique aqui
</button>

<div class="fotos">

<img src="juntos feliz.jpeg">
<img src="sorrisao.jpeg">
<img src="juntos.jpeg">

</div>

</div>

<script>

let etapa = 0;

const etapas = [
{
foto: "linda.jpeg",
texto: "De vez em sempre me pego admirando o quão linda você é!"
},
{
foto: "estilo.jpeg",
texto: "Dona de todos os estilos."
},
{
foto: "sorriso.jpeg",
texto: "Obrigado por trazer felicidade aos meus dias."
},
{
foto: "professora.jpeg",
texto: "Você é a minha professora favorita!"
},
{
foto: "academia.jpeg",
texto: "Prometo trabalhar bastante pra te fazer feliz meu bem."
},
{
foto: "sucesso.jpeg",
texto: "Cada dia mais me orgulho de você e desejo todo sucesso do mundo pra você xuxu!"
},
{
foto: "superjuntos.jpeg",
texto: "Estarei sempre do seu lado. te amo ❤️"
}
];

function mensagem(){

const container = document.querySelector(".container");

if(etapa < etapas.length){

container.innerHTML = `
<h1>Você é incrível Xuxu ❤️</h1>

<img src="${etapas[etapa].foto}" style="
width:350px;
border-radius:20px;
margin-top:30px;
box-shadow:0 15px 30px rgba(0,0,0,0.4);
">

<p style="margin-top:30px;font-size:22px;">
${etapas[etapa].texto}
</p>

<button onclick="mensagem()">
Continuar
</button>
`;

etapa++;

}

}

</script>

</body>
</html>
